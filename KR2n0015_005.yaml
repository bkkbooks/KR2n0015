body:
  text: 法帖釋文巻五宋劉次莊撰蒼頡夏禹仲尼史籕李斯程邈宋儋衛夫人古法帖兄子皆佳能數為也隋朝帖智果奕奕皆有一種風氣爽爽如有神力豈須文譜范懐約真書有分草書無功故知簡牘非易志其名李斯見重一時耶何氏吞聲飲氣不勞頓爾他便生異議速自詳答取竟勿滯留也去留深情故當所爾餘散軰停嵗積故切思歸三月下旬還非賒冀叙不遥路行乃寂絶傷心蔡琰我生之初尚無為我生之後漢祀衰古法帖孤不度德量力欲義於天下而措術淺短遂至昌蹶然至於今日志猶不息君謂計將安出亮白董卓已來豪傑並起跨州連郡不可勝數曹操比於袁紹則名微而衆寡故能剋紹以弱為強今日擁百萬之衆協挾天子而令諸侯誠能不可與爭鋒也右帖四前二具載王獻之帖中此不復釋後二帖亦與獻之筆法同懐素右軍云吾真書過鍾而草故不減張僕以為真不如鍾草不及張所為世之所重以其能懐素書之不足以為道其言當不虚也張旭足下晚後不知疾痛如何深極憂難比也上下安之必得發耶得足下十五日問為慰僕前患差張旭書古法帖既移屋近西薔微援裏地成大寛援裏起小三架如步廊政可一丈梁得使二家通出入作門閤也此屋之東故應作墻直步廊一壁太單空園中彌宜移三間屋故當不甚難重複粗盡圖如别耳足下既有意適閒曠亦當惡暑耶遊矚疎數慰對告今少吾今年病垂耳始小差大小㑹使疾惛忽移日耳每毎深望逺言慰尚賒慨然𤣥過之音介忽忽書復既與直人理略絶何縁復有周旋理長史斷闊亦不減卿唯公事時相瞻望耳吾面信遂至今不著不可解計至故應必有香但不知好惡云何耳須得法帖釋文卷五
