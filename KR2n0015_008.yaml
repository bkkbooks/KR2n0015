body:
  text: 法帖釋文卷八宋劉次莊撰王羲之羲之死罪小大悉以來未不可懷未復咨誨問懸情計賔命行應至遲卞公逺具承問妹極得散力以為至慰期等故爾耳因緣不多白羲之死罪不審定何日當北遇信復白遲承後問伏想清和士人能佳適桓公十月末書為慰云所在荒甚可憂殷生數問北事勢復云何想安西以至能數面不或云頓歷陽爾耶無緣同為歎遲知問運民不可得而要當得甚慮叛散頓為此足勞人意八日羲之頓首多日不知君問得一昨書知君安善為慰僕似小差而疲劇昨若耶觀望乃苦輿上隱痛前後未有此也然一日一昔勞復不極以此為慰耳力不鄉里人樂著縣户今送其名可為領受君頃就轉佳不僕自秋便不佳今故不善差頃還少噉脯又時噉麵亦不以為佳亦自勞弊散係轉久此亦難以求泰不去人問而欲求方外此或速弊皆如君言便大熱足下晚可耳甚患此熱力不具王羲之上此書因周常侍想必至吾唯辨辨便知無復日也諸懷不可言知彼人已還吾之猶有小小往來不欲來者其野近當往就之耳不大思其方不見可久理而任之者悠然此可歎息得西問無他想彼人甚平安此粗佳𤣥度來數日為慰中郎女頗有所向不今時婚對自不可復得僕德意君頗冷不大都此亦當在君耶發瘧比日疾患欲無賴未面邑邑反不具王羲之得書知問腫不差乏氣忽忽面近羲之報足下各如常昨還殊頓胸中淡悶干嘔轉亂食不可強疾髙難下治乃甚憂之力不具王羲之得書知足下問吾既不佳賢內妹未差延期須狼毒市求不可得足下或有者分三兩停須故示得書知問吾夜來腹痛不堪見卿甚恨想行復來修齡來經日今在上虞月末當去重熙旦便西與别不不可不知安所在未審時意云何甚今人耿耿一昨得安西六月書無他無所知表亦復常言耳闊轉久勞想豈舍知足下常得之卒未近緣如何足下數令知問十一月四日羲之白冬中感懷深始欲寒足下常疾何如不得近問邑邑吾故苦心痛不得食虛頓力及不具王羲之白周益州送此笻竹杖卿尊長或須今送不得執手此恨何深足下各自愛數惠告臨書悵然阮公故爾可憂時放恕大事今令速言何方守篤大灸不得力而從事以至甚無計自必出唯須小佳鐵石今出取救足下可復助旦令得通家月末當至上虞妹亦俱去此蒸濕難為人得示知足下故爾堪行想不成病耳吾至無賴行剋王羲之頓首不得西問耿耿近令送此宅圖云可得卌畝爾者為佳可與水丘共行視佳者決便當取問其賈謝生多在山下不復見且得書疾惡冷耿耿想數知問雖得還不能數可歎不審比出日集聚不一爾緬然恐東旋未期諸情罔飛白不能乃佳意乃篤好此書至難或作復與卿羲之白昨故遣書當不相遇知君還喜慰足下時行想今善除猶耿耿僕時行以十一日而不保如比日便成委頓今日猶當小勝不知能轉佳不積不卿至劣劣力還不具王羲之白不審復何似求日多少看未九日當採菊不至日欲其行也但不知當晴不耳倫等還殊慰意增慨知足下疾患小佳當惠緣想必能果遲此善散非直思想而已也尋復有問足下以數示由為諸力不具月半哀感奈何奈何念邑邑罔極之至不可居處比日何似痺差不悒悒力知王羲之頓首知彼乃爾切切汝乃獨坐但有憂色懸逺不能得遣人且吾無復久意果去當南視汝等也一昨得安西六日書無他無所大說故不復付送讓都共表亦復常言耳如見子書道嵩自必果今復與書督之足下勑令至并與逺書也奉黃甘二百不計佳想故得至耳船信不可得不知前者至不尊夫人不和想小爾今以佳念纍息卿佳不吾故劣劣力知問王羲之敬問日五期結極以大先師之言皆著推此言之無驗如此事君當欲知故及宜停宅先生適書亦小小不不能佳大都可耳三月十六日羲之白一昨省不悉雨快君可不萬石轉差也灸得力不不得後問懸悒不知懷君云當有㫖信遲望其至僕劣劣故遣不具還具示王羲之取卿女知耳為長史休種知何似耿耿適欲遣書云得示知足下得涼以為佳甚慰知多疾患念勞心吾故不欲食幾以為事恐不可久邑邑思面行故果之王羲之此郡之弊不謂頓至於此諸逋滯非復一條獨坐不知何以為治自非常才所濟吾無故舍逸而就勞歎恨無所復及耳夏人事請託亦所未忽小都冀得小差須日當何理法帖釋文卷八
