body:
  text: 法帖釋文巻一宋劉次莊撰漢章帝辰宿列張盈昃海鹹河淡鱗羽翔龍師火帝鳥官人皇始制文字乃服衣遐邇壹體罔談彼短無恃已長尺璧非尚寸隂是競孝當竭力忠興温若思慎終宜令學優登仕攝職從政都邑二京背芒面洛浮渭既集墳典亦晉武帝省啓知既下須防具具揚州寒到有者比尚擬之動靜更啓也數遣信還西晉宣帝之白阿史病轉差未皆外曹尚書云得書法東晉元帝安軍未報平和之如何深可為事也八月九日睿頓首忽中秋但有逺懐便微冷恒何如比殊不能佳惟勿得慰抱念及不多司馬睿頓首東晉明帝康帝哀帝簡文帝文孝王武帝書皆楷法故不復釋宋明帝鄭脩容有凡䘮今成服汝可令汝内人知之再報休祐休範二家内人知也彧報齊髙帝吾今至破堈在路粗可尋還遲見卿不逺願信知卿深意也梁武帝數朝脚氣轉動不得多有憂懸情也二謝處委曲復當有情故舊數有書問不可復有興也知何時再言話報之梁髙帝簡文帝唐太宗胷氣參具忌欲怕死欲似死遽操翰墨故斯表意為善之暇相足怡神不知信復今為北邊動靜遣無久嬰沈疾虚弊何言昨旦臨朝略無勞惙不佳旦來何似軒丘御扆六相宣其景化媯水乗時五臣濟其鴻業數日來氣發今旦服一飲子不得相見髙宗太子無事欲僻洛城西門仗聼更不須覆陳長沙王叔懐云須吾既不司此行極是園中梅始發既無工力治未花之與今付此不多叔懐答自足何用此花永陽王陳伯智熱甚汝習讀為勞吾疾劣遣不具伯智疏寒嚴比氣力何似僕疾劣甚情想遇今信㫖此不多陳伯智疏法帖釋文巻一
  hash: sha256:9ae8e1fefe78be37c3b5ca2dff40bfa968bf5029925d6cc340f7eda530d4217d
