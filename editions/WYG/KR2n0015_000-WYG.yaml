body:
  text: 法帖釋文目錄類二金石之屬提要臣等謹案法帖釋文十巻宋劉次莊撰次莊字中叟長沙人崇寧中嘗官御史曹士冕法帖譜系云臨江戲魚堂帖元祐間劉次莊以家藏淳化閣帖十巻摹刻堂上除去巻尾篆題而増釋文曽敏行獨醒集志曰劉殿院次莊自幼喜書嘗寓於新淦所居民屋忩牖牆壁題寫殆徧臨江郡庫有法帖十巻釋以小楷他法帖之所無也觀二書所記則次莊之作法帖釋文本附注石刻之中未嘗别為一集此本殆後人於戲魚堂帖中鈔合成帙而仍以閣本原第編之者也陳振孫書録解題又稱武岡人嘗傳刻絳州潘氏帖嘉定中汪立中又取劉本分入二十巻中官帖所無者増附之葢絳帖本閣帖而廣之故立中釋文亦因次莊釋文而廣之與此又别一書矣乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fec4e63bf4f6e9ef67b49367c330fb810b554937b4f6266f129929b5ae35182b
