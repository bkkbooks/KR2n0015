body:
  text: 法帖釋文卷二宋劉次莊撰漢張芝知汝殊愁且得還為佳也冠軍蹔暢釋當不得極蹤可恨吾病來不辨行動潜不可耳終年纒比當治何理耶且方有諸分張不知比去復得一㑹不講竟不竟可恨汝還當思更就理一昨遊悉誰同故數徃虎丘不此甚蕭索祖希時面因行藥欲數處看過還復共集散耳不見奴粗悉書云見左軍彌數論聼故也今欲歸復何適報之遣不知總散侍郎耶言别事有及過謝憂勤二月八日復得鄱陽等多時不耳為慰如何平安等人當與行不足不過彼與消息八月九日芝白府君足下不日秋凉平善廣深彌邁想思無違前比得書不逐西行望逺懸想何日不懃捐業漂沒不當行李又去春送舉䘮到美陽須待伴比故遂簡絶有縁復相聞餐食自愛張芝幸甚幸甚崔子玉賢女委頓積日治此為憂懸憔心今已極佳足下勿復憂念有信來數附書知聞以解其憂魏鍾繇吳皇象文武將墜乃俾俊臣整我皇綱董此不䖍古君子即戎從身昭其果毅尚其桓桓師尚七十氣冠三軍詩人作歌如鷹如鸇天有泰一五將三門地臣象言頑闇容薄加以年老凡百乖穢無所聞宜特䝉哀傷殊異之遇安感騎乗之懽遊息之燕淳和足使忘軀命榮觀足以光心膂延望翹翹念在効報而走垂須終何才力以答新恩唯尚有借近趙走文過首貧尚尋天恩智方當私成無任顔愛自彌文唯晉張華得書為慰僕諸惛疾己甚蹔西臥歸還乃悉比將念反不具張華呈桓温大事之日僕在都謂無所復見慰勞又計時事也逐節郎來已具言意餘所慰勞諸相具答邊將粗當尔耳僕無所使治度意王導省示具卿辛酸之至吾甚憂勞卿此事亦不蹔忘然書足下所欲致身處尚在彀中王制正自欲不得許卿當如何導亦天明徃導白改朔情増傷感濕蒸自何如頗小覺損不帖有應下懸耿連哀勞懣悶不具王導王敦敦頓首頓首蜡節忽過嵗暮感悼傷悲今邑想自如常比苦腰痛憒憒得示知意反不以悉王敦頓首頓首王洽洽白辱告承問洽故爾劣劣冀以復叙還日不具王洽再拜洽白向感塞不成叙得告承問殊乏劣白不具王洽再拜王珉十八日珉白以二書蹔至未更近問懸情不適似可不吾羸疾故爾憂深力書不具王珉敬問得書至之吾亦今欲出耳吾此月急遣廿四是王濟祖日欲必赴卿可尅過明吾當下解相待餐出亦遣報既至王家畢卿可豫檄光公令作一頓美食可投其飯也王珉相報王珣三月四日珣頓首未冬衆感得七月書知問即日何如秋弊憂之劣不具王珣頓首白王廙廿四日廙白唯久白想適妙來行未面遲想得示知同云冀何生相見近及不多王廙白七月十三日告藉之等近日遣王秋書不言月行復半念汝思不可堪居柰何柰何雨涼不差㛐何如汝所患遂差未懸心不可言阿母䝉恩上下悉佳宜可行瘧如復斷要取未斷愁人宜復具日發與別罔罔不可言今遣使未北反書不足白復㑹日消息廙疏郗鑒郗愔九月七日愔報比得章知弟漸佳至慶想今漸勝食進不新差難將適猶懸憂遣不具愔報廿四日愔報比書想悉達日諒弟佳不及數字愔報逺近何王右軍竟去不付石首干一節想親親悉如常敬豫何當來耶道祖故未善差恒在尚書不見來多日郗超衛瓘頓州民衛瓘惶恐死罪中闕音敬望想想懐在外累年始爾得還情甚踴躍旦望卅里上領節度明日乃入奉說欣承福祚得白不具瓘惶恐死罪衛恒一日有恨知問未面為歎欲七日去耶恒白謝安柰何柰何臨書悽悶謝萬汝等各可可知近聞邑邑吾渉道動下􅐄乏劣力及不具具告父疏法帖釋文卷二
