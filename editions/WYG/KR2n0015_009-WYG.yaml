  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0015_WYG_009-1a, image: WYG0681/WYG0681-0418c.png}
body:
  text: 法帖釋文巻九宋劉次莊撰王獻之相過終無復日悽切在心未嘗蹔掇一日臨坐目想勝風但有感慟當復如何常謂人之相得古今洞盡此處殆無恨于懐但痛神理與此而窮耳盡此感深殆無處常恨況相遇之難而乖其所同省告不覺灌流既已徃矣亦復何言獻之諸舍復何如吾家多患憂面以問慰情不知可耳承永嘉比復患下上下諸疾患乃爾燋馳豈可懐不審今復何如㛐即平和耳貞夀不成病不鵞還慰姊意今已嘗向發分張諸懐可言殊嘗復憂懸婢腹痛見差不劉家疾患即差秀已還也諸女無日事懸心阮新婦何日至慰姊目下獻之死罪授衣諸感悲情伏惟哀慕兼慟痛毒難居見徐隽并使君書承比極勝但承此㐫問當復大頓耳比日憂馳無復意不審尊體云何脚及可痛氣得此哀號何如先大惡時灸創特不堪此不乃為患眼食幾許使君今地實難為識然所以為識政在此耳獻之白奉别告承安和慶慰極冷不審尊體復何如獻之比日如復小勝因夜行忽復下如欲作㿃今服藥盡温燥理冀當可耳然異極都不得復小失和卿惡亦不復得妄近生冷體氣頓至此令人絶歎行有佳酒便服想彼悉佳汝復見諸女不此近下故爾耳獻之白承姑比日復小進退其爾不得一極和憂懸猶深不審以服散未必得力耳比驎相聞故云惡縁懐使君數得書也獻之白思戀觸事彌至獻之既欲過餘杭州將若比還京必視之來月十左右便當發奉兄無復日比告何喻願復盡珍重理獻之白獻之白節過嵗終衆感纒心㐲惟同之奉月初告承極不平復頭眼半體疹恒惡兄告說姊故殊黄瘦憂馳可言寒切不審尊體復何如眠食轉進不氣力漸復先耳遲復㫖告獻之故爾獻之願餘上下安和知婢日夕疏慰意育故羸懸心倪比健也適奉永嘉去月十二日動靜故常患不寜諸女無復消息獻之再拜夏節近感思深惟窮號崩絶不可忍處晴快不審體中何似食噉復多少甚馳情不審諸舍復何如未復西動靜不寜此多患反側願深寛勉故承問思戀無徃不慰省告對之悲塞未知何日復得奉見何以喻此心唯願盡珍重理遲此信反復知動靜十二月廿七日具疏操之獻之再拜嵗盡無復日感思兼懐不自勝兄亦同之柰何柰何奉十二日告承掾安和慰馳情姊三兄諸患故爾不損憂馳情快不審尊體並復何如遲復來告操之故平平已再復散冀得力獻之亦惡憒勿謹拜疏不具操之等再拜衛軍猶未平和而哀勞殊未得盡消息理常以不寜僕射得散力甚慰表解臺職不知得恕不復冠軍告懸企獻之白兄靜息應佳何以復小惡耶伏想比消息理盡轉勝耳礜石深是可疑事凡喜患散輙發癕勢為積乃不易願復更思獻之唯頼消息内外極生冷而心腹中恒無他此一事是差但疾源不除自不得佳論事當隨宜思之也獻之姊性纒綿觸事殊當不可獻之方當長愁耳獻之白不謂鄱陽一門艱故至此追尋悲惋益不自勝柰何柰何政坐視其滅盡使人悲熟頼子髙在此不爾無可成獻之阮新婦勉身得雄甚善散騎殊常喜也雖奉對積年可以為盡日之歡常苦不盡觸頗之暢方欲與姊極當年之足以之偕老豈謂乖别至此諸懐悵塞實深當復何由日夕見姊耶俯仰悲咽實無已無已唯常絶氣耳夏日感思兼悼切割心懐痛當柰何柰何得思道書慰意薄熱汝比各可不吾並故諸惡勞益勿勿獻之白疏獻之白思戀轉不可言瞻近而未得奉見但有歎塞遲諸攸還具動靜獻之白白東告具天寳疾患問何其倉卒乏子孫常欣倫早成家以此娛上下豈謂奄失此女愍惜深至惻切心懐㛐哀念當可為心情願不可保使人惋惋悲政常隨事豁之耳嫂先積弊復有此痛心不審不乃惡不甚以憂馳眠食復多少願遣無益盡消息理吾十一日發吳興違逺兄姊感戀無喻慶等别不可言比奉告故多患姊經感極頓憂馳益深適諮議十六日告風疾故爾反側餘可行未東動靜不寜吾宜速吳與丞别兄進猶戀罔勞亦極惡馳情二女晚生皆佳未復華姜疏比來得直疏故惡故足當視華也汝兒女並可不廿九日獻之白昨遂不奉恨深體中復何如弟甚頓勿勿不具獻之再拜承服腎氣丸故以為佳獻之比服黄蓍甚勤平平耳亦欲至十齋當可知得書為慰吾先夜遂大得服湯酒諸治漸相故頓極難勞知足下便去不得面别怏恨深保愛臨書増懐王獻之𤣥度時徃來以此為慰興公使適還數日具都下問人情所憂良可歎息諸吳數問齡前來經日極為差云仁祖欲請為軍司不知行不慕容有易頼意耶薄冷足下沈痼已經嵗月豈宜觸此寒耶人生禀氣各有攸處想示消息益部耆舊傳令送想催驅寫取了慎不可過淹留吾去月從孫家求信次頓爾頻為亂反側餳大佳柳六惠言餳可常餌亦覺有益耳前告先以陳事意必是更有家信未知期說見德逺書所致人耶何可足下今耶鬱鬱澗底松離離山上苖以彼徑寸莖䕃此百尺條世胄躡髙位英隽沈下僚一月廿九日告仲宗奉世諸皃禍變無常黄門隕背哀痛摧剥不自勝任柰何柰何及書感塞父姑告念外甥欲問郗新婦更篤憂慮深獻之白思戀轉不可言瞻近而未得奉見但有歎塞遲諸信還具動承冦軍故爾不覺轉勝灸無所覺憂馳深汝燋悚可耳可必不耳企遲此大都如常秀順至慰意順心痛委頓燋勞諸舎不能集㑹深哽塞仰料靜婢自常不和知從事甚簡致此佳也法帖釋文卷九
