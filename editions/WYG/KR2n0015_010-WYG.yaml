  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0015_WYG_010-1a, image: WYG0681/WYG0681-0422a.png}
body:
  text: 法帖釋文卷十宋劉次莊撰王獻之吾當託桓江州助汝吾此不辨得遣人船迎汝當具東改枋三四吾小可者當自力無御迎汝故可得五六十人小枋諸謝當有便是見今當語之大理盡此信還具白胛痛可堪而以作書絶欲不可識疾不退潜處當日深豈可以常理待之此豈常憂不審食復何如肌色可可所堪轉勝復以此慰馳疎耳消息亦不可不恒精以經心向秋冷疾下亦應防也獻之下斷來恒患頭項痛復小爾耳省前書故有集聚意當能果不足下小大佳不聞官前逼遣足下甚急想以相體恕耳足下兄子以至廣州耶當有得集理不念懸心也耳近與鐵石共書令致之想久達不得君問以復經月懸情豈可言頃更寒不適頗有時氣君頃各可耳遲㫖問僕大都小佳然疾根聚在右髀脚重痛不得轉動左脚又腫疾候極是不佳幸食眠意事為復可可冀非藏病耳知鐵石前徃快作樂諸君善處世一達於當年不復過此僕端坐將百日為尸居解日耳不知那得一散懐何其相思之深臨書意塞𤣥度何來遲深足人憂懸耶常謂有理因祠監多感足下事甚善然所造極難想足下每思先後公豈須言親親不已意耳安石停此過半日猶得一宿何物喻之一十當浦送近道所以致歎陽諸懐皃不可言且不復得卿送有諸歎今此貪上道忽動小行多書夜十三四起所去多又風不差脚更腫轉欲書疏自不可已唯絶歎於人理耳二妹復平平昨來山不差靜政當還委曲前書具想勝常也諸人悉何如承冠軍定入計今向逹都汝奉見欣慶但恐停日不多耳慶等已至也鵞差不甚懸心宜道尋去奴定西諸分張少言新婦服地黄湯來似減眠食尚未佳憂懸不去心君等前所論事想必及謝生未還何爾進退不可解吾當書問也鴨頭丸故不佳明當必集當與君相見不審阿姨所患得差否極令懸惻想東陽諸妹當復平安不審頃者情事漸差耶彼郡今載甚不能佳不知早晚至當遂至郡深想望斁奴此月唯省一書亦不足慰懐深悉足下情素耳七月二日獻之白孫權據有江東以歴三世國險而民附賢能為用斯可與為援而不可圖也益州天府之地髙祖因之以成帝業荆州北據漢沔利盡南海西連巴蜀東通吴㑹此用武之國而其不能治天所以資將軍將軍既是帝室之胄信義著於四海來之大國誠難至也鄱陽書停諸舍便有月未具散騎書知情至草草未發遣奉去月問承婦等復不能差深憂慮耳獻之白不審疾得損未極憂及更能出入未前書云至於散情嫂疾苦療得所深喜慰想必為問敬和晚際似差耶諸舎也能向諸弟各也獻之白極熱敬惟府君此月内得書來時幾得問希此消息極悶悶軍中復如何患膿不能潰意甚無頼君有好藥必時復與府中多少極濟事也承冠軍故爾不覺轉勝灸無所覺憂馳深汝燋悚可言服油得力更能噉數麫只五六日停也不至絶艱辛也足下明當必果想即日如何深想憶近奉阿姑告知平安極慰人意獻之遂不堪暑氣力恒惙恐是惡風大都將息近似小却白承舍内分違近豫遂就難以喻痛濟理獻之白復面悲積蕃首以不佳耿耿僕近動散委頓雖轉折猶惙然發止尚以未定日冀以言首力還不復耳還此今有書何以至不知諸舎故多患念勞以今差也得領軍書故在風丹陽書常疾動耿耿亦足得鄱陽近書為慰丹陽疾者不果來甚悵悵得西問不寢復云何令人邑邑具示東家尚未欲下李參軍無政日有此議能自來此方寸無使聞上極不妙之事獻之頓首八月十九日具疏操之獻之再拜昨日諸願悉達奉奉告慰馳心極冷不審尊體復何如操之創故不差常惡亦故爾憒憒獻之昨來復下如欲作㿃殊乏極服石的丸冀得力謹謹不具操之等再拜獻之白不審尊體復何如昨夜眠多少願盡寛喻理憂馳可復言若得消息者獻之嫂等承更惡不審頃痊復不必須散時終得力耶此藥甚佳想姊舉體不能行履服遂差安西且無恙府君屬有和稀久滯行路同人絶得此心故當携其長㓜詣汝上下知彼駱驛有書示不足以慰吾意耶冬間必欲至足下所居承使君明練不謂漸有勝也君散集驟然其大都可耳吾止於月半間耶鄱陽歸鄉承脩東轉有理吾賢畢欲事必俟勝歡慰于懐耶吾終權宜至承今年饑饉仰唯年支都乏絶不謂乖又至於此耶吾脚尚未差極憂也獻之等再拜不審海監諸舎上下動靜比復常憂之姊告無他事崇虚劉道士鵞羣並復歸也獻之等當須向彼謝之獻之等再拜敬祖日夕還山隂與嚴使知聞頗多嵗月今屬天寒擬適逺為當柰何柰何爾豈不令念姊逺路不能追求耳太宗皇帝嘗遣使購募古先帝王名臣墨帖集為十卷淳化三年冬詔刋之後大臣登二府皆以賜焉歐陽修云往時禁中火災焚其板或云尚在但不賜元祐四年臣得本於前金部員外郎臣呂和卿命工摹刻之後二年復取帖中草書世所病讀者為釋文十巻並行於時所以上廣太宗皇帝垂意訓示天下後世之學者耳元祐七年五月十九日前承議郎臣劉次莊謹題太宗皇帝深於草書嘗論之智永帖中矣真宗皇帝亦善草聖仁宗皇帝喜飛白書飛白盖王羲之以為難而不敢自以為善者仁宗皇帝乃獨善之英宗皇帝最喜書儒臣王廣淵以書得侍從神宗皇帝喜徐浩書熙寜元豐間天下化之臣為宗正時聞先帝大喜鍾王書天下復將化之矣七月八日臣次莊書法帖釋文卷十
