  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0015_WYG_006-1a, image: WYG0681/WYG0681-0407c.png}
body:
  text: 法帖釋文卷六宋劉次莊撰王羲之適得書知足下問吾欲中治甚憒憒向宅上靜佳眠都不知足下來一甚無意恨不暫面王羲之知欲東先期共至謝欲處云何欲行想忘耳過此如命差涼君可不今日實顧不遲面力知問王羲之比奉對對兄以釋豈一汝不可言未知集聚日但有慨歎各慎護前與㛐試求屏風遂不得答為也奄至此禍情願不遂緬然永絶痛之深至情不能已况汝豈可勝任奈何奈何無由叙哀悲酸日月如馳㛐棄背再周去月穆大祥奉瞻廓然永惟悲摧情如切割汝亦增慕省疏酸感兄靈柩垂至永惟崩慕痛貫心膂痛當奈何計慈顔幽翳垂卅年而吾忽忽不知堪臨始終不發言㛐絶當復奈何吾頃至忽忽比加下省别具足下小大問為慰多分張念足下懸情武昌諸子亦多逺宦足下兼懷並數問不老婦頃疾篤救命恆憂慮餘粗平安知足下情至旦夕都邑動靜清和想足下使還時州將桓公告慰情企足下數使命也謝無奕外任數書問無他仁祖日往言尋悲酸如何可言欲想㛐安和自下悉佳松上下至乖隔十八年復得一集且悲且慰何指喻㛐疾至篤憂懷甚深穆松難為情地自慰猶小差然故忽忽冀得涼漸和耳諸從並數有問粗平安唯修載在逺音問不數懸情司州疾篤不果西公私可恨足下所云皆盡事勢吾無間然諸問想足下别具不復一一此諸賢粗可時見省甚為簡逺須異多小患而吾疾篤不得數為歎耳宰相安和殷生無恙時面兄當宣兄懷噉豆鼠傷如佳今送能噉不得足下旃罽胡桃藥二種知足下至戎鹽乃要也是服食所須知足下謂須服食方回近之未許吾此志知我者希此有成言無緣見卿以當一笑秋中感懷異雨冷足下各可耳胛風遂欲成患甚憂之力知問王羲之頓首又不能不痛熙孝政爾復何於求之度政當求之內事餘理不絶求之一條當有冀不信罔然前塗願乙乙誨之以悟其心疾不退潜損亦當日深豈可以常理待之此豈常憂不審食復何如云肌色可可所堪轉勝復以此慰馳竦耳吾有七貌一女皆同生婚娶以畢唯一小者尚未婚耳過此一婚便得至彼今內外孫有十六人足慰目前足下情至委曲故具示省足下别疏具彼土山川諸竒揚雄蜀都左太冲三都殊為不備悉彼故為多奇益令其遊目意足也可得果當告卿求進少人足耳至時示意遲此期真以日為嵗想足下鎮彼土未有動理耳要欲及卿在彼登汶領峨眉而旋實不朽之盛事但言此心以馳於彼矣云譙周有孫髙尚不出今為所在其人有以副此志不令人依依足下具示嚴君平司馬相如揚子雲皆有後不夫人遂善平康也足下各可不冀行復面王羲之頓首想小大悉佳蔡家賔至君情感益深唯當撥遣之耳知足下散勢小差此慰無以為喻云氣力故爾復以胡怛想散患得差餘當以漸消息耳吾頃無一日佳衰老之弊日至夏不得有所噉而猶有勞務甚劣昨得熙草六日書云患氣懸情知足下連不快何爾耿耿善將適吾積羸困而下積日不斷情慮尚深殊乏自力不能悉小佳更致問一一適修載書平安羲之白奉告慰反側伏想比安和伯熊過見之悲酸大都可耳惟垂心羲之平平一日白比具羲之白送此鯉魚征與敬耶不在不乃邑邑不月半哀悼兼至奈何奈何得告承復下懸耿至匆匆願不具王羲之再拜今遣鄉里人往口言也行成旅以從是月也景風司至星火殷宵伯趙鳴而載隂爽鳩習而揚武時可以升髙逺望禮可以出宿餞行有詔具僚爰開祖草二日羲之報近得書即日又得永興書甚慰想在道可耳吾疾故爾沉滯憂悴解日面近不具羲之報四月二十三日羲之頓首昨書不悉君可不腫劇憂之力遣不具羲之頓首闊别稍久眷與時長寒嚴足下何如想清豫耳披懷之暇復何致樂諸賢從就理當不疏吾之朽疾日就羸頓加復風勞諸無意賴促膝未近東望慨然所冀日月易得還期非逺耳深敬宜音問在數遇信匆遽萬不一陳旦極寒得示承夫人復小咳不善得眠助反側小爾復進何藥念足下猶悚息卿可不吾昨暮復大吐小噉物便爾旦來可耳知足下念王羲之頓首卿與虞休意書有所問足下㫖為致誠答令㫖意致來勿忘此意自決今以資嚴知小大疾患念勞心四月五日羲之報建安靈柩至慈䕃幽絶垂卅年永惟慕痛徹五內永酷奈何無由言昔臨紙摧哽羲之報吾昨得一日一起腹中極調適無所為憂但顧情不可言耳侍中書書徐侯遂危篤恐無復冀深令人反側敬豫乃成委頓令人深憂適十五日問清和為慰復得南後問不想二庾速王之始興奴長就令人邑邑想無所至耳還具示問追尋傷悼但有痛心當奈何奈何得告慰之吾昨頻哀感便欲不自勝舉旦復服散行之益頓乏推理皆如足下所誨然吾老矣餘願未盡惟在子輩耳一旦哭之垂盡之年將無復理此當何益冀小却漸消散耳省卿書但有毁塞足下念顧言散所豁多也王羲之頓首不得臨川問懸心不可言子嵩之子來數有使冀因得間問示之得袁二謝書具為慰袁生暫至都已還未此生至到之懷吾所也想小大皆佳知賔猶爾耿耿想得夏節佳也念君勞心賢姊大都轉差故有時嘔食不已至足下年衰疾久亦非可倉卒大都轉差為慰以大近不復服散常將陟厘也此藥為益如君告適太常司州鎮軍諸人草五六書皆佳司州以為平復此慶慶可言餘親親皆佳大奴以還吳也冀或見之司州供給寥落去無期也不果者公私之望無理或復是福得大等書慰心今因書也野數言疏平安定太宰中郎近因得里人書想至知故面腫耿耿今差不吾比日食意如差而髀中故不差以此為至患至不可勞力數字今弟知問耳疾患差也念憂勞王羲之頓首想弟必有過理得暫寫懷若此不果役期欲難冀臨書多歎吾不復堪事比成此書便大頓草日羲之頓首節日感歎深念君增傷灾雨君可也僕可耳力數字王羲之頓首定聼他母子哀此遂不還可令來也適重熙書如此果爾乃甚可憂張平不立勢向河南者不知諸侯何以當之熙表故未出不說說荀侯疾患想當轉佳耳若熙自勉此一役當可言淺見實不見今時兵任可處理二謝在此近終日不同之此歎恨不得方回知幸知幸後問令人怛怛法帖釋文卷六
