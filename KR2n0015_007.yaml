  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0015_WYG_007-1a, image: WYG0681/WYG0681-0411c.png}
body:
  text: 法帖釋文卷七宋劉次莊撰七月一日羲之白忽然秋月但有感歎信反得去月七日書知足下故羸疾問觸者逺涉憂卿不可言吾故羸乏力不具王羲之白得都下九日書見桓公當陽去月九日書久當至洛但運遲可憂耳蔡公遂委篤又加㿃下日數十行深可憂慮得仁祖廿六日問疾更委篤深可憂當今人物眇然而艱疾若此令人短氣謝光禄亦垂命可憂念二朝奄忽傷人懐今年彫落可哀歎徂暑感懐深得書知足下故頓乏食差不耿耿吾故爾耳未果為結力不具王羲之月半念足下窮思深至不可居忍雨濕體氣各何如參軍得針灸力不甚懸情當深寛割晴通省苦遣不具王羲之白長素差不懸耿小大佳也得敬豫九日問故進退之深知念許君與足下意政同但今非致言地甚勑勑亦不知范生以居職未以卿示輙便及之吾尚不能惜小節目但一開無解巳又亦終無能為益適足為煩瀆足下呼爾不每念長風不可居忍昨得其書既毁頓又復壯温深可憂謝生多在山不復見且得書疾惡冷耿耿想數知問雖得還不能數可歎初月二日羲之頓首忽然今年感兼傷痛切心柰何柰何念君哀窮不巳羲之皇恐足下時事少可數來至人相尋下官吏不東西未委若為言叙乖足下不返重遣信徃問願知心素吾恠足下參朝少晚不審有何事情致使如然也王羲之再拜前從洛至此未及就彼參承願夫子勿悒悒矣當日縁明府共飲遂闕問願足下莫見責羲之頓首十一月廿七日羲之報得十四十八日二書知問為慰寒切比各佳不念憂勞久懸情吾食至少劣劣力因謝司馬書不具羲之報十月七日羲之報前過足下所得其書想殊有勞弊然叔兄子孫有數人足慰目前情至取答委曲故具示可令必達以副此志且山川甚有形勢逺想慨然又出藥精要有騐信次可致當大惠也從弟分别吾深憂慮卿女轗軻想何可處差充喜言不多耳羲之皇象草章㫖信送之勿三當付良信逺婦疾猶爾其餘可耳今取書付想具阮生何如此麤平安數絶問為慰羲之白君晚可不想比果力不具王羲之得逺嘉興書計今日必度喜遲可言足下至慰今有書想足下有㫖信别告具之云足下尚停數日半百餘里瞻望不得一見卿此何可言足下疾苦晴便大熱恒中至不易可得過夏不甚憂卿還具示問得告承長平未佳善得適適君如常也知有患者耿耿念勞心食少勞甚頓還白不具王羲之再拜足下小大佳也諸疾苦憂勞非一如何復得都下近問不吾得敬和廿三日書無他重熙徃定為善謝二侯省飛白乃致佳造次尋之乃欲窮本無論小進也稱此將青於藍知比得丹陽書甚慰乖離之歎當復可言尋答其書足下反事復行便為索然良不可言此亦分耳遲面具具太常故患胛灸俞體中可可耳僕射事己行以表讓未知恕不未復司州㫖告懸竦鄱陽嵗使應有書而未得向亦得萬書委曲備悉使人慨然見足下乃悉知叔虎剋昨發月半略必至未見勞參軍者熱日更甚得書知足下不堪之同此無頼早且乗凉行欲徃遲散也王羲之知賢室委頓何以使爾甚助耿耿念勞心知得廿四問亦得叔虎廿二日書云新年乃得發安石昨必欲剋潘家欲剋廿五日也足下以語張令未前所經由足下近如似欲見今送七月六日羲之白多日不知問邑邑得二日書知足下昨問耿耿今已佳也期已至遲還具足下問耳當力東論道家無縁省苦但有悲慨不得東此月問信云舍子送别乃是北方物也何以欲此欲幾許致此四紙飛白以為何似能學不月未必徃遲見君無以為喻鄉里人擇藥有發簡而得此藥者足下豈識之不乃云服之令人仙不知誰能試者形色故小異莫與嘗見者謝二侯昨見君歡後無喻然未善悉想宿昔可耳脅中云何一善消息值周轉勝也耿耿疾患小差與𢎞逺俱詣遲共寫懐王羲之承足下還來已久欲參慰為染患不能得徃問眷仰情深豈此委具一兩日少可尋冀言展若因行李願存故舊今遇賢弟還得數張紙勞動幸不恠耳謹此代申不具釋智永此帖世多論為差誤盖太宗皇帝取其書類右軍遂參列其間所以貴之耳太宗於草聖最為深妙乃特不曉此釋智永字耶雪候既不已寒甚盛冬平可苦患足下亦當不堪之轉復知問王羲之知逺比當造次遲見此子真以日為嵗足下得審問㫖令吾荀侯佳不未果就卿深企懐耳安好音信那可遇得歸洛也計令解懸休尋知君當有分住者念處窮毒而復分乖尚可居情想反理斷當旦反想至所苦差不耿耿僕脚中不堪沈隂重痛不可言不知何以治之憂深力不具王羲之頓首深以自慰理有大斷其思豁之令盡足下勿乃憂之足下殊當憂吾故具示問晚復毒熱想足下所苦並以佳猶耿耿吾至頓劣異涼意散力知問王羲之頓首足下家極知無可將接為雨遂乃不復更諸弟兄問疾深䕶之不具王羲之白耳僕近脩小園子殊佳致果雜藥深可致懐也儻因行徃希見比二處動靜故之常患馳情散騎㿈轉利慶慰姊故諸惡反側永嘉至奉集欣喜無喻餘可耳得華直疏故爾諸惡不差懸憂順何似未復慶等近消息懸心君並何為耶此猶未得盡集理行大剋遲此無喻龍保等平安也謝之甚遲見之離不可居叔當西耶遲知問知彼清晏嵗豐又所使有無鄉故是名處且山川形勢乃爾何可以不遊目朱仁處今何在徃得其書信遂不取答今因足下答其書可令必達愛為退臨書但有惆悵知足下行至吳念違彼鹽井火井皆有不足下目見不為欲廣求異聞具示足下今年政七十耶知體氣常佳此大慶也想復懃加頥養吾年垂耳順推之人理得爾以為厚幸但恐前路轉欲逼耳以爾要欲一遊目汶領非復常言足下但當保䕶以俟此期勿謂虚言得果此縁一叚奇事也法帖釋文卷七
