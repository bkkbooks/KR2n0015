body:
  text: 法帖釋文巻三宋劉次莊撰晉庾亮媞音氏又音啼弟江淮呼母也庾翼莫大羽飛也音榻吾哀勞何頼愛䕶時不足下頃氣力熟若别時沈嘉嘉頓首頓首嵗有感懐深寒切想各平安僕勞弊遣不具沈嘉頓首頓首杜預十一月十四日預頓首嵗忽已終别久益兼其勞道逺書問又簡間得來說知消息申省次若言面親故數移轉想祖父白具云也祖父如足下來言小大云具絶汝親親也有信數附書信以慰吾心也王循七月廿四日循頓首秋月感思深得近示為慰餘熱比復可不僕疾患故爾不平復頓勿力書不盡王循頓首劉超謝璠伯此計江東精兵不可卒得唯當善養見者而事慮日多如比來憂懐實己萬端王徽之得信承㛐疾不減憂灼寜復可言吾便欲徃恐不見汝等湖水泛漲不可渡遂復隔絶不然尋已徃彼故遣疏知吾逺懐不具徽之等告謝莊弟昨還方承一日忽患悶當時乃爾大惡殊不易追企怛想諸治昨來己漸勝眠食復云何頃日寒重春節至居患者無不増動今作何治眼風不異耳指遣承問謝莊白呈左僕射司馬攸劉瓌之瓌之頓首頓首末陽逺感閏知有患耿耿知以自屈恨不相見力及不比望瓌之王坦之王渙之王操之王凝之索靖載妖㜸過臧災甾莫告咎臯陶士繩罪報鞠按據號裁割辜戮羞屈愬謾逆曲歸想輟寂鬪爭念復鞉鼔肆陳愛於琴瑟以詠歌其命禽爵翔榮獸乃歌舞聲翳麗城越動飛走脉土處農姬業掌稷七月廿六日具書靖白雖數相聞不解勞倦信具得書云宅及計來東言展有期索靖白劉穆之所欲足下家弊耳倉卒無禄故推遷不得不相用事已御出寜復吾所得迴復足下且當就之公還當思更律啓申師情事也劉穆之白王劭紀瞻瞻白昨信來今盖又貧家無以將意今粉二斗少香所謂物微意全者也力書不多紀瞻頓首王廞張翼廿三日卿翼頓首節過多懐得近書為慰意以何如深勞弊頓曵力還不具陸雲三月十六日雲白春節餘不適得示知足下平安為思面未如何由如何信數之及卿既清䆳可之經髙言人歎之當今征南取之也王䆳王恬得示知足下問吾故不差殊劣劣力不具王恬白山濤卞壼足下佳不朝郎上獲諸誠文墨至便在舎事許改愛子紙下物知此草勿令一人見也吾今勑書事令不發亟付卿發發便宻令人傳之壼白謝發未欲㫖問悲酸悒悒想不久可得還耳執筆惻感王曇昨服散差耳然不過佳請和所宜如更増劇恐難為力耳未能令遣俗有餘念頓耳王曇答和南羊欣書欲何言孔琳日月深酷撫膺崩叫心肝分膾尋繹懊憹觸感隕絶孤思悒悒自郡地最當柰何不孝柰何念痛悼難勝得去月二示知君所患故爾不差甚有幽悒熱盛比復何似想已轉佳眠食極勝也善將治之孤子並疾患歎具悒悒脚中轉劇近明散未覺益惙頓何頼扶力迷甚不次孤子孔琳柰何頓首王僧虔法帖釋文卷三
