body:
  text: 法帖釋文卷四宋劉次莊撰王筠沈約今年約垂始得此沈約白十一月十六日阮研道增至得書深慰己熱卿何如吾甚匆匆始過嶠今便下水未因見卿為歎善自愛異日當至上京有因道增行所具少字不具阮研頓首蕭確故以孝事君則忠以敬事長則順忠順不失以事其上然後能保其祿位而守其祭祀蓋士之孝也詩云夙興夜寐無忝爾所生蕭思話一月二日思話白節近說寒切足下復何如比何一涉道久當諸惡耶少首望近吾所患猶爾思話白蕭子雲陳逵十二月草五日逵白嵗終感慘寒切足下何如遣不悉陳逵伯禮啓明願問訊足前許借纛今遣請受願付佳仰于悚息謹啓禇遂良諸何足言更得汝狀汝悉也虞世南率一兩日訪問願為奉答賢兄處見臨樂毅論便是青過於藍欣忭無已數願學耳世南近臂痛發書不堪覼縷也虞世南呈十三日遣書謹空得書為慰可言也潘六云司未得近問莫耶數小奴等計不日當有狀來歐陽詢吳君何當至定須寄信意未能平復極欲知君等柳公權未即展豁尚增後使送往耶李雍禇庭誨薛稷徐嶠之陸柬之近得告為慰上下無恙恙不得吳興近問懸心得藥書散勢耿耿嘗也薄紹之知弟定欲江參軍薄紹之白法帖釋文卷四
  hash: sha256:7e88ecf1b080b16b63edb2d4db18df227e03f709e2362a2ba72c5f52946e39bd
